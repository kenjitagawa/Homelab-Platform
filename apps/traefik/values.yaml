service:
  type: LoadBalancer

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    http:
      tls:
        enabled: true
        certResolver: letsencrypt

api:
  dashboard: true
  insecure: false

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--providers.kubernetesingress.allowexternalnameservices=true"

persistence:
  enabled: true
  name: data
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 1Gi
  path: /data

logs:
  general:
    level: INFO
  access:
    enabled: true

metrics:
  prometheus:
    enabled: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: kenjitagawa.kt@gmail.com
      storage: /data/acme.json
      dnsChallenge:
        provider: cloudflare

env:
  - name: CF_DNS_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-secret
        key: api-token

deployment:
  replicas: 1

  initContainers:
    - name: volume-permissions
      image: busybox:latest
      command:
        - sh
        - -c
        - touch /data/acme.json && chmod 600 /data/acme.json
      volumeMounts:
        - name: data
          mountPath: /data

podSecurityContext:
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
