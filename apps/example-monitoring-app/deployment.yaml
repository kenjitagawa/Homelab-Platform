apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: example-monitoring-app
  labels:
    app.kubernetes.io/name: example-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: example-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-app
    spec:
      containers:
        - name: example-app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
          - name: web
            containerPort: 8080
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"